schemaVersion: "1.0"
metadata:
  id: "three-step-system-python"
  name: "Three Steps - System Python Pipeline"
  description: "Three-step Python workflow using system Python: load, transform, finalize"
  version: "1.0"
  tags:
    - "python"
    - "system"
    - "three-step"
    - "fixture"

environments:
  "env-system":
    name: "system"
    kind: "system"
    spec: {}

steps:
  # Step 1: Load data — validates input and adds row_id
  - id: "load-data"
    metadata:
      name: "Load Data"
      description: "Read input CSV and add a row_id column"
      version: "1.0"
    environmentId: "env-system"
    dependsOn: []
    task:
      type: "command"
      id: "task-load"
      name: "load-data"
      executable: "python"
      args:
        - "scripts/step1_load.py"
        - "input.0"
        - "output.0"
    inputs:
      - id: "input-csv"
        descriptor:
          type: "csv"
          format: "utf-8"
          notes: "Raw input data"
        source:
          type: "file"
          path: "inputs/input.csv"
    outputs:
      - id: "loaded-csv"
        descriptor:
          type: "csv"
          format: "utf-8"
          notes: "Validated data with row_id"

  # Step 2: Transform — uppercases string values
  - id: "transform-data"
    metadata:
      name: "Transform Data"
      description: "Uppercase all string values"
      version: "1.0"
    environmentId: "env-system"
    dependsOn:
      - "load-data"
    task:
      type: "command"
      id: "task-transform"
      name: "transform-data"
      executable: "python"
      args:
        - "scripts/step2_transform.py"
        - "input.0"
        - "output.0"
    inputs:
      - id: "loaded-csv"
        descriptor:
          type: "csv"
          format: "utf-8"
        source:
          type: "step-output"
          stepId: "load-data"
          outputId: "loaded-csv"
    outputs:
      - id: "transformed-csv"
        descriptor:
          type: "csv"
          format: "utf-8"
          notes: "Data with uppercased values"

  # Step 3: Finalize — appends a status column
  - id: "finalize-data"
    metadata:
      name: "Finalize Data"
      description: "Add a status column to mark processing complete"
      version: "1.0"
    environmentId: "env-system"
    dependsOn:
      - "transform-data"
    task:
      type: "command"
      id: "task-finalize"
      name: "finalize-data"
      executable: "python"
      args:
        - "scripts/step3_finalize.py"
        - "input.0"
        - "output.0"
    inputs:
      - id: "transformed-csv"
        descriptor:
          type: "csv"
          format: "utf-8"
        source:
          type: "step-output"
          stepId: "transform-data"
          outputId: "transformed-csv"
    outputs:
      - id: "final-csv"
        descriptor:
          type: "csv"
          format: "utf-8"
          notes: "Final output with status column"
