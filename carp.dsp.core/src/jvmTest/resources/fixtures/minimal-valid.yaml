schemaVersion: "1.0"
metadata:
  id: "minimal-workflow-001"
  name: "Minimal Valid Workflow"
  description: "A minimal 2-step workflow demonstrating basic structure and step dependencies"
  version: "1.0"
  tags:
    - "fixture"
    - "example"
    - "minimal"

environments:
  system-env:
    name: "System Environment"
    kind: "system"
    spec: {}

steps:
  - id: "echo-hello"
    metadata:
      name: "Echo Hello"
      description: "First step: echo a greeting message"
      version: "1.0"
    environmentId: "system-env"
    dependsOn: []
    task:
      type: "command"
      name: "echo-greeting"
      description: "Echo a simple greeting"
      executable: "echo"
      args:
        - "Hello from the minimal workflow!"
    inputs: []
    outputs: []

  - id: "echo-goodbye"
    metadata:
      name: "Echo Goodbye"
      description: "Second step: echo a goodbye message (depends on step 1)"
      version: "1.0"
    environmentId: "system-env"
    dependsOn:
      - "echo-hello"
    task:
      type: "command"
      name: "echo-farewell"
      description: "Echo a farewell message"
      executable: "echo"
      args:
        - "Goodbye from the minimal workflow!"
    inputs: []
    outputs: []
