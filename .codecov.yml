codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 70%
        threshold: 2%
        informational: false
    patch:
      default:
        target: 60%
        threshold: 2%
        informational: false

comment:
  layout: "reach,diff,flags,tree,reach"
  behavior: default
  require_changes: false

ignore:
  - "detekt/**"
  - "**/test/**"
  - "**/*Test.kt"
  - "**/*Tests.kt"
  - "**/*Spec.kt"

