coverage:
  status:
    project:
      default:
        target: 75%
        threshold: 1%
    patch:
      default:
        target: 60%
        threshold: 0%

ignore:
  - "**/*$serializer*"
  - "**/*$Companion*"
  - "**/*$DefaultImpls*"
  - "**/*$WhenMappings*"
  # Module-level excludes (paths use module folder names, e.g. carp.dsp.demo/)
  - "carp.dsp.demo/**"
  - "detekt/**"
  - "**/carp.dsp.demo/**"
  - "**/detekt/**"
  # Test utilities
  - "**/testutils/**"

comment:
  layout: "reach,diff,flags,files"
  behavior: default