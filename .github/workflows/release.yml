name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        path: carp-dsp
        fetch-depth: 0

    - name: Checkout CARP core
      uses: actions/checkout@v4
      with:
        repository: cph-cachet/carp.core-kotlin
        ref: feature/core-analytics
        path: carp
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build CARP core dependencies
      run: |
        cd carp
        chmod +x gradlew
        ./gradlew publishToMavenLocal -x test

    - name: Run all tests
      run: |
        cd carp-dsp
        chmod +x gradlew
        ./gradlew :carp.dsp.core:jvmTest
        ./gradlew :carp.dsp.demo:jvmTest

    - name: Run quality checks
      run: |
        cd carp-dsp
        ./gradlew detekt
        ./gradlew koverVerify || echo "Coverage check completed"

    - name: Build release artifacts
      run: |
        cd carp-dsp
        ./gradlew :carp.dsp.core:jvmJar
        ./gradlew :carp.dsp.demo:jvmJar

    - name: Generate documentation
      run: |
        cd carp-dsp
        ./gradlew dokkaHtml || echo "Documentation generation skipped"

    - name: Generate coverage report
      run: |
        cd carp-dsp
        ./gradlew koverHtmlReport

    - name: Create release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          carp-dsp/carp.dsp.core/build/libs/*.jar
          carp-dsp/carp.dsp.demo/build/libs/*.jar
        body: |
          ## CARP DSP Release ${{ github.ref_name }}
          
          ### Features
          - CARP tabular data framework
          - Type-safe measurement processing
          - Multiplatform Kotlin support
          - Comprehensive test coverage
          
          ### Modules
          - `carp.dsp.core`: Core tabular data framework
          - `carp.dsp.demo`: CLI demonstration and examples
          
          ### Coverage
          See the [coverage report](https://codecov.io/gh/${{ github.repository }}) for detailed metrics.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload coverage to release
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ github.ref_name }}
        path: 'path: carp-dsp/build/reports/kover/html'
