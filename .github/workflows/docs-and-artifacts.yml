name: Documentation and Artifacts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  documentation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build documentation
      run: ./gradlew dokkaHtml || echo "Dokka not configured yet"

    - name: Build JAR artifacts
      run: ./gradlew :carp.dsp.core:jvmJar :carp.dsp.demo:jvmJar

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jar-artifacts-${{ github.run_number }}
        path: |
          carp.dsp.core/build/libs/*.jar
          carp.dsp.demo/build/libs/*.jar

    - name: Generate coverage badge
      run: |
        ./gradlew koverXmlReport
        echo "Coverage report generated"

  quality-gates:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run quality checks
      run: |
        ./gradlew detekt --continue
        ./gradlew koverVerify || echo "Coverage verification - check thresholds"

    - name: Upload detekt reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: detekt-reports-${{ github.run_number }}
        path: |
          build/reports/detekt/
          detekt/build/reports/detekt/
