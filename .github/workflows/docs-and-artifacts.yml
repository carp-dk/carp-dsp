name: Documentation and Artifacts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  documentation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        path: carp-dsp
        fetch-depth: 0

    - name: Checkout CARP core
      uses: actions/checkout@v4
      with:
        repository: cph-cachet/carp.core-kotlin
        ref: feature/core-analytics
        path: carp
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build CARP core dependencies
      run: |
        cd carp
        chmod +x gradlew
        ./gradlew publishToMavenLocal -x test

    - name: Build documentation
      run: |
        cd carp-dsp
        chmod +x gradlew
        ./gradlew dokkaHtml || echo "Dokka not configured yet"

    - name: Build JAR artifacts
      run: |
        cd carp-dsp
        ./gradlew :carp.dsp.core:jvmJar :carp.dsp.demo:jvmJar

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jar-artifacts-${{ github.run_number }}
        path: |
          carp-dsp/carp.dsp.core/build/libs/*.jar
          carp-dsp/carp.dsp.demo/build/libs/*.jar

    - name: Generate coverage badge
      run: |
        ./gradlew koverXmlReport
        echo "Coverage report generated"

  quality-gates:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        path: carp-dsp
        fetch-depth: 0

    - name: Checkout CARP core
      uses: actions/checkout@v4
      with:
        repository: cph-cachet/carp.core-kotlin
        ref: feature/core-analytics
        path: carp
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build CARP core dependencies
      run: |
        cd carp
        chmod +x gradlew
        ./gradlew publishToMavenLocal -x test

    - name: Run quality checks
      run: |
        cd carp-dsp
        chmod +x gradlew
        ./gradlew detekt --continue
        ./gradlew koverVerify || echo "Coverage verification - check thresholds"

    - name: Upload detekt reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: detekt-reports-${{ github.run_number }}
        path: |
          carp-dsp/build/reports/detekt/
          carp-dsp/detekt/build/reports/detekt/
