name: Documentation and Artifacts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  documentation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout carp-dsp
      uses: actions/checkout@v4
      with:
        path: carp-dsp
        fetch-depth: 0

    - name: Checkout CARP core
      uses: actions/checkout@v4
      with:
        repository: cph-cachet/carp.core-kotlin
        ref: feature/core-analytics
        path: carp.core-kotlin
        fetch-depth: 0

    - name: Verify CARP core setup
      run: |
        cd carp.core-kotlin
        echo "🔍 CARP core verification:"
        echo "  - Branch: $(git branch --show-current)"
        echo "  - Commit: $(git log -1 --oneline)"
        
        CURRENT_BRANCH=$(git branch --show-current)
        if [ "$CURRENT_BRANCH" != "feature/core-analytics" ]; then
          echo "❌ ERROR: Expected branch 'feature/core-analytics', got '$CURRENT_BRANCH'"
          exit 1
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build CARP core dependencies
      run: |
        echo "🔨 Building CARP core for documentation..."
        cd carp.core-kotlin
        chmod +x gradlew
        ./gradlew publishToMavenLocal -x test --info || {
          echo "❌ CARP CORE BUILD FAILED (docs-and-artifacts)"
          exit 1
        }

    - name: Set environment for composite build
      run: echo "USE_LOCAL_CORE=true" >> $GITHUB_ENV

    - name: Build documentation
      run: |
        echo "📚 Building documentation..."
        cd carp-dsp
        chmod +x gradlew
        ./gradlew dokkaHtml --info || echo "⚠️ Dokka not configured yet, skipping"

    - name: Build JAR artifacts
      run: |
        echo "📦 Building JAR artifacts..."
        cd carp-dsp
        ./gradlew :carp.dsp.core:jvmJar :carp.dsp.demo:jvmJar --info || {
          echo "❌ JAR artifact build failed"
          exit 1
        }
        echo "✅ JAR artifacts built successfully"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jar-artifacts-${{ github.run_number }}
        path: |
          carp-dsp/carp.dsp.core/build/libs/*.jar
          carp-dsp/carp.dsp.demo/build/libs/*.jar

    - name: Generate coverage badge
      run: |
        echo "📊 Generating coverage badge..."
        cd carp-dsp
        ./gradlew koverXmlReport --info || {
          echo "❌ Coverage badge generation failed"
          exit 1
        }
        echo "✅ Coverage report generated successfully"

  quality-gates:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout carp-dsp
      uses: actions/checkout@v4
      with:
        path: carp-dsp
        fetch-depth: 0

    - name: Checkout CARP core
      uses: actions/checkout@v4
      with:
        repository: cph-cachet/carp.core-kotlin
        ref: feature/core-analytics
        path: carp.core-kotlin
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build CARP core dependencies
      run: |
        echo "🔨 Building CARP core for quality gates..."
        cd carp.core-kotlin
        chmod +x gradlew
        ./gradlew publishToMavenLocal -x test --info || {
          echo "❌ CARP CORE BUILD FAILED (quality-gates)"
          exit 1
        }

    - name: Set environment for composite build
      run: echo "USE_LOCAL_CORE=true" >> $GITHUB_ENV

    - name: Run quality checks
      run: |
        echo "🔍 Running quality checks..."
        cd carp-dsp
        chmod +x gradlew
        
        echo "🔍 Running detekt..."
        ./gradlew detekt --continue --info || echo "⚠️ Detekt issues found"
        
        echo "📊 Running coverage verification..."
        ./gradlew koverVerify --info || echo "⚠️ Coverage verification - check thresholds"

    - name: Upload detekt reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: detekt-reports-${{ github.run_number }}
        path: |
          carp-dsp/build/reports/detekt/
          carp-dsp/detekt/build/reports/detekt/
