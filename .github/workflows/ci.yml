name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        path: carp-dsp
        fetch-depth: 0

    - name: Checkout CARP core
      uses: actions/checkout@v4
      with:
        repository: cph-cachet/carp.core-kotlin
        ref: feature/core-analytics
        path: carp
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build CARP core dependencies
      run: |
        cd carp
        chmod +x gradlew
        ./gradlew publishToMavenLocal -x test

    - name: Build and test carp-dsp
      run: |
        cd carp-dsp
        chmod +x gradlew
        ./gradlew build

    - name: Run core module tests
      run: |
        cd carp-dsp
        ./gradlew :carp.dsp.core:jvmTest

    - name: Run demo module tests
      run: |
        cd carp-dsp
        ./gradlew :carp.dsp.demo:jvmTest

    - name: Run detekt code analysis
      run: |
        cd carp-dsp
        ./gradlew detekt

    - name: Generate coverage report
      run: |
        cd carp-dsp
        ./gradlew koverXmlReport

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./carp-dsp/build/reports/kover/report.xml
        fail_ci_if_error: false
        verbose: true

    - name: Compile demo CLI
      run: |
        cd carp-dsp
        ./gradlew :carp.dsp.demo:compileKotlinJvm

    - name: Generate HTML coverage report
      run: |
        cd carp-dsp
        ./gradlew koverHtmlReport

    - name: Upload HTML coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report-${{ github.run_number }}
        path: carp-dsp/build/reports/kover/html/

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results-${{ github.run_number }}
        path: |
          carp-dsp/**/build/reports/tests/
          carp-dsp/**/build/test-results/

    - name: Comment PR with coverage
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        message: |
          ## 📊 Coverage Report
          
          Coverage reports have been generated and uploaded to Codecov.
          
          - [View detailed coverage report](https://codecov.io/gh/${{ github.repository }}/pull/${{ github.event.number }})
          - HTML report available as workflow artifact
          
          ### Quick Stats
          The coverage report will be available once processing completes on Codecov.

